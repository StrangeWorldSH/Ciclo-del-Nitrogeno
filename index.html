<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CICLO DEL NITRÓGENO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --neon: #00f2fe; --purple: #bc13fe; --bg: #010811; --danger: #ff0055; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at center, #001a33 0%, #010811 100%);
            color: #fff; font-family: 'Share Tech Mono', monospace; overflow: hidden; height: 100vh; 
        }

        #starfield { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.4; }

        .scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .scene.active { display: flex; animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CARTAS DE CONTENIDO */
        .mol-card { display: grid; grid-template-columns: 1.2fr 1fr; width: 90%; max-width: 1100px; background: rgba(0, 15, 30, 0.9); border: 2px solid var(--neon); border-radius: 15px; padding: 40px; box-shadow: 0 0 50px rgba(0,242,254,0.15); }
        .mol-text h2 { font-family: 'Orbitron'; font-size: 4.5rem; color: var(--neon); text-shadow: 0 0 20px var(--neon); }
        .mol-text p { font-size: 1.4rem; line-height: 1.6; margin: 20px 0; color: #b0e0ff; }

        /* RULETA MEJORADA */
        .wheel-container { position: relative; width: 520px; height: 520px; }
        #wheelCanvas { border-radius: 50%; border: 8px solid #fff; box-shadow: 0 0 60px var(--neon); background: #000; }
        .marker { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 25px solid transparent; border-right: 25px solid transparent; border-top: 50px solid var(--danger); z-index: 50; }

        /* BOTÓN MAESTRO */
        .master-btn { position: fixed; bottom: 40px; right: 40px; background: var(--neon); color: #000; padding: 20px 60px; border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; font-size: 1.3rem; transition: 0.3s; z-index: 1000; clip-path: polygon(0 20%, 10% 0, 100% 0, 100% 80%, 90% 100%, 0 100%); }
        .master-btn:hover { transform: scale(1.05); background: #fff; box-shadow: 0 0 30px var(--neon); }

        /* OVERLAY */
        #res-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .res-banner { border: 4px solid var(--purple); padding: 50px; background: #000; box-shadow: 0 0 100px var(--purple); }
    </style>
</head>
<body>

    <div id="starfield"></div>
    <button class="master-btn" id="ctrlBtn" onclick="masterControl()">Comenzar >></button>

    <section id="s-portada" class="scene active">
        <h1 style="font-family:'Orbitron'; font-size:7rem; color:var(--neon); text-shadow:0 0 40px var(--neon);">CICLO DEL NITRÓGENO</h1>
        <div style="border-top: 2px solid var(--purple); margin-top: 20px; padding-top: 10px;">
            <p style="font-size:1.8rem; letter-spacing:12px;">CARLOS, YANDIEL, ZABDIEL, GEOVANNY</p>
        </div>
    </section>

    <section id="s-moleculas" class="scene">
        <div class="mol-card">
            <div class="mol-text">
                <h2 id="disp-title">N2</h2>
                <p id="disp-desc">Iniciando base de datos...</p>
                <div id="disp-extra" style="color:var(--purple); font-weight:bold; font-size:1.2rem; border-left: 3px solid var(--purple); padding-left: 15px;"></div>
            </div>
            <div id="3d-frame" style="height:450px;"></div>
        </div>
    </section>

    <section id="s-ruleta" class="scene">
        <div class="wheel-container">
            <div class="marker"></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>
        <button id="spinBtn" onclick="startSpin()" style="margin-top:40px; background:var(--danger); color:white; padding:15px 50px; border:none; font-family:'Orbitron'; cursor:pointer; font-weight:bold; font-size:1.2rem;">GIRAR</button>
    </section>

    <section id="s-final" class="scene">
        <h1 style="font-family:'Orbitron'; font-size:8rem; color:var(--neon); text-shadow:0 0 30px var(--neon);">FIN.</h1>
        <p style="font-size:2rem; color:var(--purple); letter-spacing:10px;">PROYECTO COMPLETADO</p>
    </section>

    <div id="res-overlay">
        <div class="res-banner">
            <h1 id="win-name" style="color:var(--neon); font-size:5rem; font-family:'Orbitron';"></h1>
            <p style="color:#fff; margin:20px 0; font-size:1.5rem;">PREGUNTA ASIGNADA:</p>
            <div id="win-quest" style="font-size:2.2rem; background:rgba(255,255,255,0.05); padding:40px; border:1px solid #333; color:var(--neon);"></div>
            <button onclick="closeResult()" style="margin-top:30px; padding:15px 40px; cursor:pointer; font-family:'Orbitron';">ENTENDIDO</button>
        </div>
    </div>

    <script>
        let currentStep = "portada";
        let mIdx = 0;
        let rotation = 0;
        const alumnos = ["Juan", "Santiago", "Gleiliannys", "Yolfran", "Andrew", "Profe", "Sebastian", "Joseilys", "Allys", "Juana", "Lizolet", "Wilkely", "Maikely", "Camila", "Betsaida", "Isaac", "Dariannys"];
        const preguntas = [
            "¿Cuál es el símbolo y número atómico?",
            "¿Qué enlace tiene la molécula de N2?",
            "¿Cómo se llama el proceso de N2 a NH3?",
            "¿A qué temperatura hierve el nitrógeno?",
            "¿Por qué el amonio (NH4) es vital?"
        ];

        const data = [
            { t: "N2", d: "El N2 es la fórmula química del nitrógeno molecular o gas nitrógeno, un gas inerte, incoloro, inodoro e insípido que constituye aproximadamente el 78% de la atmósfera terrestre. Es una molécula estable formada por dos átomos de nitrógeno unidos por un triple enlace, fundamental para la vida y muy usado industrialmente como atmósfera inerte.", e: "Triple Enlace Covalente / Muy Estable" },
            { t: "NH3", d: "El NH3 es la fórmula química del amoníaco (o amoniaco), un compuesto inorgánico incoloro, gaseoso y con un olor penetrante y característico. Está compuesto por un átomo de nitrógeno y tres de hidrógeno. Es un compuesto esencial en la industria para fertilizantes y productos de limpieza, además de ser vital para los procesos biológicos.", e: "Geometría Piramidal / Olor Penetrante" },
            { t: "NH4", d: "El NH4 es el ion amonio, un catión (ion con carga positiva) formado por un átomo de nitrógeno y cuatro de hidrógeno. El NH4 es el ion amonio, un catión (ion con carga positiva) formado por un átomo de nitrógeno y cuatro de hidrógeno.", e: "Catión Acuoso / Nutriente Base" },
            { t: "NO2", d: "El dióxido de nitrógeno NO2 es un gas inorgánico altamente reactivo, de color pardo-rojizo y olor penetrante, formado por nitrógeno y oxígeno. Es un contaminante atmosférico clave, producido principalmente por la combustión de combustibles fósiles (tráfico y centrales térmicas), y causa graves problemas respiratorios, irritación y lluvia ácida.", e: "Subproducto de Combustión / Tóxico" },
            { t: "NO3", d: "El nitrato NO3 es un ion poliatómico inorgánico formado por un átomo de nitrógeno y tres de oxígeno (\(1N + 3O\)), con carga negativa. Es un nutriente esencial para las plantas, componente clave de fertilizantes, conservante de alimentos y un subproducto en el tratamiento de aguas, crucial en el ciclo del nitrógeno.", e: "Altamente Soluble / Crecimiento Vegetal" }
        ];

        function masterControl() {
            if (currentStep === "portada") {
                changeScene("s-portada", "s-moleculas");
                renderMolecule();
                currentStep = "moleculas";
                document.getElementById('ctrlBtn').innerText = "SIGUIENTE MOLÉCULA >>";
            } 
            else if (currentStep === "moleculas") {
                mIdx++;
                if (mIdx < data.length) {
                    renderMolecule();
                } else {
                    changeScene("s-moleculas", "s-ruleta");
                    initWheel();
                    currentStep = "ruleta";
                    document.getElementById('ctrlBtn').style.display = "none";
                }
            }
        }

        function changeScene(hide, show) {
            document.getElementById(hide).classList.remove('active');
            document.getElementById(show).classList.add('active');
        }

        function renderMolecule() {
            const m = data[mIdx];
            document.getElementById('disp-title').innerText = m.t;
            document.getElementById('disp-desc').innerText = m.d;
            document.getElementById('disp-extra').innerText = "PROPIEDAD: " + m.e;
            init3D('3d-frame', m.t);
        }

        // --- RULETA ---
        function initWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const arc = (Math.PI * 2) / alumnos.length;
            ctx.clearRect(0,0,500,500);
            alumnos.forEach((name, i) => {
                ctx.fillStyle = i % 2 === 0 ? "#00f2fe" : "#bc13fe";
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 245, i * arc, (i + 1) * arc);
                ctx.fill();
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(i * arc + arc / 2);
                ctx.fillStyle = "#000";
                ctx.font = "bold 13px Orbitron";
                ctx.fillText(name.toUpperCase(), 100, 5);
                ctx.restore();
            });
        }

        function startSpin() {
            const canvas = document.getElementById('wheelCanvas');
            const spinAdd = 3600 + Math.random() * 3600;
            rotation += spinAdd;
            canvas.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.1, 1)";
            canvas.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                const finalAngle = (rotation % 360);
                const correction = (360 - finalAngle + 270) % 360;
                const slice = 360 / alumnos.length;
                const winIdx = Math.floor(correction / slice) % alumnos.length;

                document.getElementById('win-name').innerText = alumnos[winIdx].toUpperCase();
                document.getElementById('win-quest').innerText = preguntas[Math.floor(Math.random()*preguntas.length)];
                document.getElementById('res-overlay').style.display = 'flex';
            }, 5000);
        }

        function closeResult() {
            document.getElementById('res-overlay').style.display = 'none';
            const btn = document.getElementById('ctrlBtn');
            btn.style.display = "block";
            btn.innerText = "FINALIZAR PRESENTACIÓN >>";
            btn.onclick = () => {
                changeScene("s-ruleta", "s-final");
                btn.style.display = "none";
            };
        }

        function init3D(id, name) {
            const frame = document.getElementById(id);
            frame.innerHTML = "";
            const s = new THREE.Scene();
            const c = new THREE.PerspectiveCamera(45, frame.clientWidth/frame.clientHeight, 0.1, 1000);
            c.position.z = 5;
            const r = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            r.setSize(frame.clientWidth, frame.clientHeight);
            frame.appendChild(r.domElement);
            s.add(new THREE.AmbientLight(0xffffff, 2.5));

            new THREE.MTLLoader().setPath('Moléculas/').load(name+'.mtl', (m) => {
                m.preload();
                new THREE.OBJLoader().setMaterials(m).setPath('Moléculas/').load(name+'.obj', (o) => {
                    const box = new THREE.Box3().setFromObject(o);
                    o.position.sub(box.getCenter(new THREE.Vector3()));
                    s.add(o);
                    function animate() { requestAnimationFrame(animate); o.rotation.y += 0.015; r.render(s, c); }
                    animate();
                });
            });
        }
    </script>
</body>
</html>
